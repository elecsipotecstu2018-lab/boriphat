<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART HOME - ESP8266 Control Panel</title>
    <!-- นำเข้า Font Awesome สำหรับไอคอนสัญลักษณ์ต่างๆ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================
           1. CSS STYLING & UI THEME (สไตล์และการตกแต่ง)
           ========================================== */
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        /* ตั้งค่าพื้นหลังของหน้าเว็บเป็นโทนเข้ม */
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Prompt', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* กล่องคอนเทนเนอร์หลักของแผงควบคุม */
        .container {
            background: linear-gradient(145deg, #161b22, #10141a);
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ส่วนหัวข้อเว็บแอป */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #00f2fe; /* สีฟ้านีออนสว่าง */
            font-size: 24px;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
        }

        .header p {
            color: #8b949e;
            font-size: 12px;
            margin: 0;
            letter-spacing: 1px;
        }

        /* กล่องควบคุมของแต่ละช่องแชนแนล (D1, D2, D5, D6) */
        .channel-card {
            background-color: #21262d;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        /* เอฟเฟกต์เรืองแสงเมื่อนำเมาส์ไปชี้ที่การ์ดควบคุม */
        .channel-card:hover {
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
        }

        .channel-info i {
            color: #8b949e;
            font-size: 18px;
            width: 20px;
            text-align: center;
        }

        /* พื้นที่แสดงปุ่มสวิตช์และข้อความบอกสถานะ */
        .switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ข้อความสถานะ "เปิด" หรือ "ปิด" */
        .status-text {
            font-size: 14px;
            font-weight: 600;
            color: #8b949e;
            width: 35px;
            text-align: right;
            transition: color 0.3s;
        }

        /* โครงสร้างปุ่ม Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* พื้นหลังของปุ่มสวิตช์ */
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #8b949e;
            transition: .4s;
            border-radius: 24px;
        }

        /* ปุ่มวงกลมเล็กๆ ด้านในที่เลื่อนได้ */
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        /* สไตล์เมื่อปุ่มสวิตช์ถูกเปิดใช้งาน */
        input:checked + .slider {
            background-color: #00f2fe;
            box-shadow: 0 0 8px #00f2fe;
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* ส่วนท้ายแสดงรายละเอียดผู้พัฒนาระบบ */
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #484f58;
            line-height: 1.6;
        }
        
        .footer .developer-title {
            color: #00f2fe;
            font-weight: 600;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <!-- โครงสร้างหลัก (HTML Containers) -->
    <div class="container">
        <div class="header">
            <h1>SMART HOME</h1>
            <p>ESP8266 IoT Control Panel</p>
        </div>

        <!-- แชนแนลควบคุม 1: ช่อง D1 -->
        <div class="channel-card">
            <div class="channel-info">
                <i class="fas fa-lightbulb"></i>
                <span>ช่องที่ 1 (D1)</span>
            </div>
            <div class="switch-container">
                <span id="statusD1" class="status-text">ปิด</span>
                <label class="switch">
                    <input type="checkbox" id="switchD1" onchange="toggleDevice('D1', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- แชนแนลควบคุม 2: ช่อง D2 -->
        <div class="channel-card">
            <div class="channel-info">
                <i class="fas fa-plug"></i>
                <span>ช่องที่ 2 (D2)</span>
            </div>
            <div class="switch-container">
                <span id="statusD2" class="status-text">ปิด</span>
                <label class="switch">
                    <input type="checkbox" id="switchD2" onchange="toggleDevice('D2', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- แชนแนลควบคุม 3: ช่อง D5 -->
        <div class="channel-card">
            <div class="channel-info">
                <i class="fas fa-tv"></i>
                <span>ช่องที่ 3 (D5)</span>
            </div>
            <div class="switch-container">
                <span id="statusD5" class="status-text">ปิด</span>
                <label class="switch">
                    <input type="checkbox" id="switchD5" onchange="toggleDevice('D5', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- แชนแนลควบคุม 4: ช่อง D6 -->
        <div class="channel-card">
            <div class="channel-info">
                <i class="fas fa-snowflake"></i>
                <span>ช่องที่ 4 (D6)</span>
            </div>
            <div class="switch-container">
                <span id="statusD6" class="status-text">ปิด</span>
                <label class="switch">
                    <input type="checkbox" id="switchD6" onchange="toggleDevice('D6', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- เครดิตผู้พัฒนาระบบ -->
        <div class="footer">
            <div class="developer-title">ผู้พัฒนาระบบ</div>
            บริภัทร คูณทรัพย์<br>
            แผนกอิเล็กทรอนิกส์<br>
            วิทยาลัยสารพัดช่างศรีสะเกษ
        </div>
    </div>

    <!-- ==========================================
       2. JAVASCRIPT & FIREBASE INTEGRATION
       ========================================== -->
    <script type="module">
        // นำเข้าโมดูล Firebase SDK v10 (แบบ CDN)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // กำหนดค่าคอนฟิกูเรชันของโปรเจกต์ Firebase ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyByff94H7Sit77uKwG1qMtMm0gFs1dD4W0",
            authDomain: "planning-with-ai-794ae.firebaseapp.com",
            databaseURL: "https://planning-with-ai-794ae-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "planning-with-ai-794ae",
            storageBucket: "planning-with-ai-794ae.firebasestorage.app",
            messagingSenderId: "948486662284",
            appId: "1:948486662284:web:9668c69c16326bc75633a9"
        };

        // เริ่มต้นการใช้งานแอปพลิเคชันและฐานข้อมูล Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        /**
         * ฟังก์ชัน: toggleDevice
         * หน้าที่: อัปเดตค่าสถานะไปยัง Firebase เมื่อกดสวิตช์บนเว็บ
         * @param {string} pin - รหัสขาพินควบคุม เช่น 'D1', 'D2'
         * @param {boolean} status - สถานะเช็คบล็อก true (เปิด) / false (ปิด)
         */
        window.toggleDevice = function(pin, status) {
            const value = status ? 1 : 0; 
            // เขียนข้อมูลไปยัง Path: SmartHome/ชื่อพิน เช่น SmartHome/D1
            set(ref(db, 'SmartHome/' + pin), value)
                .catch((error) => {
                    console.error("เกิดข้อผิดพลาดในการบันทึกข้อมูล: ", error);
                    alert("ไม่สามารถบันทึกข้อมูลได้ กรุณาตรวจสอบกฎกติกาความปลอดภัย (Rules) บนระบบ Firebase Console");
                });
        };

        /**
         * ฟังก์ชัน: listenToDevice
         * หน้าที่: ดึงข้อมูลและรับฟังความเปลี่ยนแปลงจาก Firebase มาปรับแต่งปุ่มและข้อความสถานะบนแอปแบบเรียลไทม์
         * @param {string} pin - รหัสพินฐานข้อมูล
         * @param {string} switchId - id ของแท็ก input switch
         * @param {string} statusId - id ของแท็กแสดงข้อความสถานะ
         */
        function listenToDevice(pin, switchId, statusId) {
            const deviceRef = ref(db, 'SmartHome/' + pin);
            
            // ดักฟังค่าของพินอุปกรณ์เมื่อมีการเปลี่ยนแปลง
            onValue(deviceRef, (snapshot) => {
                const data = snapshot.val();
                
                if(data !== null) {
                    const isChecked = (data === 1);
                    
                    // อัปเดตสลักการติ๊กถูกของแท็ก Switch
                    document.getElementById(switchId).checked = isChecked;
                    
                    // ปรับเปลี่ยนข้อความและสีตัวอักษรของสถานะให้สอดคล้อง
                    const statusText = document.getElementById(statusId);
                    if (isChecked) {
                        statusText.innerText = "เปิด";
                        statusText.style.color = "#00f2fe"; // เปลี่ยนข้อความ "เปิด" เป็นสีฟ้านีออน
                    } else {
                        statusText.innerText = "ปิด";
                        statusText.style.color = "#8b949e"; // เปลี่ยนข้อความ "ปิด" เป็นสีเทาอ่อน
                    }
                }
            }, (error) => {
                console.error("ไม่สามารถโหลดหรือดักฟังค่าข้อมูลได้: ", error);
            });
        }

        // เริ่มต้นเปิดระบบฟังค่าสถานะอุปกรณ์ทั้ง 4 ช่องสัญญาณ
        listenToDevice('D1', 'switchD1', 'statusD1');
        listenToDevice('D2', 'switchD2', 'statusD2');
        listenToDevice('D5', 'switchD5', 'statusD5');
        listenToDevice('D6', 'switchD6', 'statusD6');
    </script>
</body>
</html>
